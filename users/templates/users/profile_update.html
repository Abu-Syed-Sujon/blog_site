{% extends "blog/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="content-section">
         <div class="media">
            {% if user_profile.profile_picture %}
            <img class="rounded-circle account-img" src="{{ user_profile.profile_picture.url }}" alt="Profile Picture" width="200">
            {% else %}
                <img class="rounded-circle account-img" src="/media/profile_pics/default.jpg" alt="Default Profile" width="200">
            {% endif %}
            
        </div>
        
        
        <div>
            <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <fieldset class="form-group">
                <legend class="border-bottom mb-4">Update Profile</legend>
                {{ p_form|crispy }}
                {{ u_form|crispy }}
            </fieldset>
            <div class="form-group">
                <div class="form-group">
                    <button class="btn btn-outline-info" type="submit">Update</button>
                </div>
            </div>
        </form>
        </div>
        
       
    </div>
{% endblock content %}
