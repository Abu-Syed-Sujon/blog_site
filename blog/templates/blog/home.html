{% extends "blog/base.html" %}

{% block content %}
    <h1>Welcome to My Blog</h1>
    <p>This is the home page of my blog site.</p>

    {%for post in posts %}

    <h2>{{post.title}}</h2>
    <p>{{post.content}}</p>
    <p>Posted by {{post.author}} on {{post.date_posted}}</p>

    {% endfor %}

{% endblock %}
